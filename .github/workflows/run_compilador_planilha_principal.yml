name: Executar compilador

on:
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Criar service_account.json a partir da secret
        run: |
          printf '%s' "${{ secrets.GOOGLE_CREDENTIALS_B64 }}" | base64 -d > service_account.json

      - name: Executar script
        run: python compilador_planilha_principal.py
