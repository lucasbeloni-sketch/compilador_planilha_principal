name: Compilador Planilha Principal

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"  # a cada 1h (UTC)

jobs:
  run_compilador:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run script
        env:
          GOOGLE_CREDENTIALS_B64: ${{ secrets.GOOGLE_CREDENTIALS_B64 }}
        run: |
          python compilador_planilha_principal.py
